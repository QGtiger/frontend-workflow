name: Build and Deploy to OSS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 👇 在这里配置你的应用名
      APP_NAME: frontend-workflow

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 👇 生成自增版本号（每次CI自动 +1）
      - name: Generate build version
        id: version
        run: |
          echo "version=${{ github.run_number }}" >> $GITHUB_OUTPUT

      # 在同一 shell 里 export VITE_BASE_URL 再执行 vite，确保 Node 进程能读到；
      # 仅用 job env 传 steps 输出时，长 URL 或空 BASE_URL 也容易踩坑。
      - name: Build
        env:
          BASE_ROOT: ${{ vars.BASE_URL }}
          APP_NAME: ${{ env.APP_NAME }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          ROOT="${BASE_ROOT%/}"
          if [ -n "$ROOT" ]; then
            export VITE_BASE_URL="${ROOT}/${APP_NAME}/${BUILD_VERSION}/"
          else
            export VITE_BASE_URL="/${APP_NAME}/${BUILD_VERSION}/"
          fi
          echo "VITE_BASE_URL=$VITE_BASE_URL"
          pnpm build

      - name: Deploy to OSS
        env:
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ACCESS_KEYID: ${{ secrets.OSS_ACCESS_KEYID }}
          OSS_ACCESS_KEYSECRECT: ${{ secrets.OSS_ACCESS_KEYSECRECT }}
          OSS_OBJECT_PREFIX: ${{ env.APP_NAME }}/${{ steps.version.outputs.version }}
        run: node scripts/deploy-oss.mjs
