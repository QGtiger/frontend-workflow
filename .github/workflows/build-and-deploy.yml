name: Build and Deploy to OSS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 👇 在这里配置你的应用名
      APP_NAME: frontend-workflow

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 👇 生成自增版本号（每次CI自动 +1）
      - name: Generate build version
        id: version
        run: |
          echo "version=${{ github.run_number }}" >> $GITHUB_OUTPUT

      # 👇 拼接最终 base：/APP_NAME/version/
      - name: Set base URL
        id: base
        run: |
          echo "base=${{ vars.BASE_URL}}/${{ env.APP_NAME }}/${{ steps.version.outputs.version }}/" >> $GITHUB_OUTPUT

      # 👇 构建时注入正确的 base
      - name: Build
        env:
          VITE_BASE_URL: ${{ steps.base.outputs.base }}
        run: pnpm build

      # ==============================
      # 正确可用：阿里云官方 ossutil 上传
      # ==============================
      - name: Deploy to Aliyun OSS
        run: |
          # 下载官方工具
          curl -o ossutil https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil

          # 配置 OSS 端点
          ENDPOINT=${{ secrets.OSS_REGION }}.aliyuncs.com

          # 上传路径：bucket/应用名/版本号/
          REMOTE_PATH="oss://${{ secrets.OSS_BUCKET }}/${{ env.APP_NAME }}/${{ steps.version.outputs.version }}/"

          # 开始上传
          ./ossutil cp -rf dist/ $REMOTE_PATH \
            --access-key-id ${{ secrets.OSS_ACCESS_KEYID }} \
            --access-key-secret ${{ secrets.OSS_ACCESS_KEYSECRECT }} \
            --endpoint $ENDPOINT \
            --cache-control "public,max-age=31536000,immutable"
