name: Build and Deploy to OSS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 👇 在这里配置你的应用名
      APP_NAME: frontend-workflow

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 👇 生成自增版本号（每次CI自动 +1）
      - name: Generate build version
        id: version
        run: |
          echo "version=${{ github.run_number }}" >> $GITHUB_OUTPUT

      # 👇 拼接最终 base：/APP_NAME/version/
      - name: Set base URL
        id: base
        run: |
          echo "base=${{ vars.BASE_URL }}/${{ env.APP_NAME }}/${{ steps.version.outputs.version }}/" >> $GITHUB_OUTPUT

      # 👇 构建时注入正确的 base
      - name: Build
        env:
          VITE_BASE_URL: ${{ steps.base.outputs.base }}
        run: pnpm build

      - name: Deploy to OSS
        env:
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ACCESS_KEYID: ${{ secrets.OSS_ACCESS_KEYID }}
          OSS_ACCESS_KEYSECRECT: ${{ secrets.OSS_ACCESS_KEYSECRECT }}
          OSS_OBJECT_PREFIX: ${{ env.APP_NAME }}/${{ steps.version.outputs.version }}
        run: node scripts/deploy-oss.mjs
