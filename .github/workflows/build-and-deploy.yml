name: Build and Deploy to OSS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 👇 在这里配置你的应用名
      APP_NAME: frontend-workflow

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 👇 生成自增版本号（每次CI自动 +1）
      - name: Generate build version
        id: version
        run: |
          echo "version=${{ github.run_number }}" >> $GITHUB_OUTPUT

      # 👇 拼接最终 base：/APP_NAME/version/
      - name: Set base URL
        id: base
        run: |
          echo "base=${{ vars.BASE_URL}}/${{ env.APP_NAME }}/${{ steps.version.outputs.version }}/" >> $GITHUB_OUTPUT

      # 👇 构建时注入正确的 base
      - name: Build
        env:
          VITE_BASE_URL: ${{ steps.base.outputs.base }}
        run: pnpm build

      # 👇 阿里云官方 OSS 上传（最安全、最稳定）
      - name: Deploy to Aliyun OSS
        uses: aliyun/action-oss-upload@v1
        with:
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          region: ${{ secrets.OSS_REGION }}
          bucket: ${{ secrets.OSS_BUCKET }}
          local-path: ./dist
          # 👇 上传到：bucket/应用名/版本号/
          remote-path: ${{ env.APP_NAME }}/${{ steps.version.outputs.version }}/
